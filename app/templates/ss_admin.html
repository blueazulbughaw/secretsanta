<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <main style="max-width:400px">
    <h2 class="center">Admin Access</h2>
    <p class="muted">Enter the master key and a username. An existing admin username logs you in; a new one creates an admin account.</p>
    {% if error %}<div class="alert alert-error" role="alert">{{ error }}</div>{% endif %}
    <form method="post">
      <label for="master_key">Master key</label>
      <input type="password" id="master_key" name="master_key" autofocus>
      <label for="username">Username</label>
      <input type="text" id="username" name="username">
      <button class="btn btn-primary" type="submit">Continue</button>
    </form>
  </main>
</body>
</html>
